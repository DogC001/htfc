<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>期货从业考试高效备考路径 - 素材图</title>
  <style>
    :root {
      --page-bg: #eef5fb;
      --ink: #142033;
      --muted: #60708a;
      --primary: #276df1;
      --cyan: #23bfd0;
      --line: #d9e6f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background: linear-gradient(135deg, #f7fbff 0%, #eaf4fb 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      color: var(--ink);
    }

    .page {
      width: min(1180px, 100%);
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 14px;
    }

    button {
      height: 36px;
      padding: 0 16px;
      border: 1px solid #c8d8eb;
      border-radius: 8px;
      background: #ffffff;
      color: #1c365d;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(39, 109, 241, 0.08);
    }

    button.primary {
      border-color: transparent;
      color: #ffffff;
      background: linear-gradient(135deg, #276df1 0%, #20bfd0 100%);
    }

    .artboard {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 28px 70px rgba(35, 72, 120, 0.18);
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="toolbar">
      <button type="button" onclick="downloadSvg()">下载 SVG</button>
      <button type="button" class="primary" onclick="downloadPng()">下载 PNG</button>
    </div>

    <section class="artboard" aria-label="期货从业考试高效备考路径素材图">
      <svg id="coverSvg" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f8fcff"/>
            <stop offset="52%" stop-color="#eef7ff"/>
            <stop offset="100%" stop-color="#e8f7f8"/>
          </linearGradient>
          <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#276df1"/>
            <stop offset="100%" stop-color="#23bfd0"/>
          </linearGradient>
          <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
            <stop offset="100%" stop-color="#f4fbff" stop-opacity="0.92"/>
          </linearGradient>
          <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#21538f" flood-opacity="0.15"/>
          </filter>
          <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
            <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dcebf6" stroke-width="1" opacity="0.58"/>
          </pattern>
          <style>
            .font { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
            .label { fill: #60708a; font-size: 24px; font-weight: 600; }
            .small { fill: #7b8ba2; font-size: 19px; font-weight: 500; }
            .dark { fill: #142033; }
            .muted { fill: #60708a; }
          </style>
        </defs>

        <rect width="1600" height="900" fill="url(#bg)"/>
        <rect width="1600" height="900" fill="url(#grid)" opacity="0.72"/>
        <path d="M60 690 C310 520, 430 690, 650 500 S1060 350, 1510 180" fill="none" stroke="#9bdce5" stroke-width="4" opacity="0.28"/>
        <path d="M85 250 C340 360, 490 230, 730 300 S1150 470, 1500 335" fill="none" stroke="#9cb8ff" stroke-width="3" opacity="0.22"/>

        <g opacity="0.48">
          <circle cx="262" cy="655" r="7" fill="#23bfd0"/>
          <circle cx="420" cy="574" r="5" fill="#276df1"/>
          <circle cx="584" cy="632" r="6" fill="#23bfd0"/>
          <path d="M262 655 L420 574 L584 632" fill="none" stroke="#8bd6e5" stroke-width="2"/>
          <circle cx="1295" cy="166" r="7" fill="#276df1"/>
          <circle cx="1398" cy="226" r="5" fill="#23bfd0"/>
          <circle cx="1465" cy="146" r="6" fill="#2db185"/>
          <path d="M1295 166 L1398 226 L1465 146" fill="none" stroke="#8fb8ff" stroke-width="2"/>
        </g>

        <g class="font">
          <rect x="128" y="147" width="262" height="46" rx="23" fill="#e6f5ff" stroke="#bddff7"/>
          <circle cx="158" cy="170" r="8" fill="#23bfd0"/>
          <text x="178" y="178" fill="#276df1" font-size="22" font-weight="700">期货从业备考工具</text>

          <text x="128" y="298" class="dark" font-size="68" font-weight="800">期货从业考试</text>

          <text x="130" y="460" class="muted" font-size="27" font-weight="500">按考点拆解知识脉络，配合刷题与错题复盘，</text>
          <text x="130" y="503" class="muted" font-size="27" font-weight="500">让备考节奏更清晰</text>

          <g transform="translate(128 572)">
            <rect width="196" height="58" rx="12" fill="url(#primary)"/>
            <text x="34" y="38" fill="#ffffff" font-size="23" font-weight="700">查看备考计划</text>
          </g>

          <g transform="translate(128 690)">

            <g class="font">
              <text x="24" y="42" class="label">基础知识</text>

            <circle cx="226" cy="110" r="22" fill="#edfaff"/>

          <g transform="translate(350 224)">

            </g>
            <path d="M30 116 C62 86, 98 111, 130 78 S190 70, 216 48" fill="none" stroke="#276df1" stroke-width="6" stroke-linecap="round"/>
            <circle cx="216" cy="48" r="7" fill="#276df1"/>

          <g transform="translate(50 404)">
            <rect width="330" height="152" rx="20" fill="#ffffff" stroke="#dbe8f4"/>

            <g fill="none" stroke-linecap="round" stroke-linejoin="round">

              <path d="M29 76 l5 5 10 -12" stroke="#23bfd0" stroke-width="3"/>
              <rect x="25" y="101" width="18" height="18" rx="5" stroke="#276df1" stroke-width="3"/>
            </g>
            <g class="font">

              <text x="60" y="117" class="small">专项练习 80 题</text>

          <g transform="translate(412 405)">
            <rect width="176" height="152" rx="20" fill="#ffffff" stroke="#dbe8f4"/>

              <text x="58" y="84" class="dark" font-size="28" font-weight="800">72%</text>
              <text x="51" y="126" class="small">计划进度</text>
            </g>
          </g>

          <g transform="translate(530 134)">
            <rect width="70" height="70" rx="20" fill="#eaf7ff"/>
            <path d="M26 48 V22 M44 48 V16 M35 48 V31" stroke="#276df1" stroke-width="7" stroke-linecap="round"/>
          </g>
        </g>
      </svg>
    </section>
  </main>

  <script>
    const fileBase = "期货从业考试高效备考路径";

    function getSvgBlob() {
      const svg = document.getElementById("coverSvg");
      const serializer = new XMLSerializer();
      const source = serializer.serializeToString(svg);
      return new Blob([source], { type: "image/svg+xml;charset=utf-8" });
    }

    function triggerDownload(url, filename) {
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function downloadSvg() {
      const blob = getSvgBlob();
      const url = URL.createObjectURL(blob);
      triggerDownload(url, `${fileBase}.svg`);
      URL.revokeObjectURL(url);
    }

    function downloadPng() {
      const svg = document.getElementById("coverSvg");
      const blob = getSvgBlob();
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = 1600;
        canvas.height = 900;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        canvas.toBlob((pngBlob) => {
          const pngUrl = URL.createObjectURL(pngBlob);
          triggerDownload(pngUrl, `${fileBase}.png`);
          URL.revokeObjectURL(pngUrl);
        }, "image/png");
      };
      img.src = url;
    }
  </script>
</body>
</html>
